<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>Forest Gathering</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #000;
    touch-action: none;
  }

  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
</style>
</head>
<body>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d", { alpha: false });

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

const GAME_W = 256;
const GAME_H = 144;

const WORLD_W = 1600;
const WORLD_H = 2400;
const TILE = 16;

const camera = { x: 0, y: 0 };

// ---------------- INPUT ----------------
let joystickTouchId = null;
let attackTouchId = null;
let joystickActive = false;
let joystickStartX = 0;
let joystickStartY = 0;
let joystickDX = 0;
let joystickDY = 0;
let attackPressed = false;

function getAttackButtonScreen() {
  return {
    x: canvas.width - 72,
    y: canvas.height - 78,
    r: 42
  };
}

function isInsideAttackButton(x, y) {
  const b = getAttackButtonScreen();
  return Math.hypot(x - b.x, y - b.y) <= b.r;
}

function handleTouchStart(t) {
  if (isInsideAttackButton(t.clientX, t.clientY)) {
    attackTouchId = t.identifier;
    attackPressed = true;
    if (!gameOver) castSpell();
    return;
  }

  if (joystickTouchId === null) {
    joystickTouchId = t.identifier;
    joystickActive = true;
    joystickStartX = t.clientX;
    joystickStartY = t.clientY;
    joystickDX = 0;
    joystickDY = 0;
  }
}

function handleTouchMove(t) {
  if (t.identifier === joystickTouchId) {
    joystickDX = t.clientX - joystickStartX;
    joystickDY = t.clientY - joystickStartY;

    const maxRadius = 38;
    const len = Math.hypot(joystickDX, joystickDY);
    if (len > maxRadius) {
      joystickDX = (joystickDX / len) * maxRadius;
      joystickDY = (joystickDY / len) * maxRadius;
    }
  }
}

function handleTouchEnd(t) {
  if (t.identifier === joystickTouchId) {
    joystickTouchId = null;
    joystickActive = false;
    joystickDX = 0;
    joystickDY = 0;
  }

  if (t.identifier === attackTouchId) {
    attackTouchId = null;
    attackPressed = false;
  }
}

canvas.addEventListener("touchstart", e => {
  if (gameOver) {
    restartGame();
    return;
  }

  for (const t of e.changedTouches) handleTouchStart(t);
}, { passive: false });

canvas.addEventListener("touchmove", e => {
  for (const t of e.changedTouches) handleTouchMove(t);
  e.preventDefault();
}, { passive: false });

canvas.addEventListener("touchend", e => {
  for (const t of e.changedTouches) handleTouchEnd(t);
}, { passive: false });

canvas.addEventListener("touchcancel", e => {
  for (const t of e.changedTouches) handleTouchEnd(t);
}, { passive: false });

// ---------------- PLAYER ----------------
const player = {
  x: 120,
  y: 120,
  w: 12,
  h: 14,
  speed: 1.8,
  dir: "down",
  step: 0,
  moving: false,
  castCooldown: 0,
  hp: 3,
  invuln: 0
};

// ---------------- WORLD ----------------
const blocked = [];

const trees = [
  {x: 96, y: 96}, {x: 176, y: 80}, {x: 320, y: 112}, {x: 448, y: 96},
  {x: 560, y: 128}, {x: 656, y: 96}, {x: 112, y: 256}, {x: 208, y: 304},
  {x: 336, y: 272}, {x: 496, y: 288}, {x: 624, y: 256}, {x: 144, y: 448},
  {x: 288, y: 496}, {x: 448, y: 464}, {x: 592, y: 496}, {x: 688, y: 560}
];

const bushes = [
  {x: 240, y: 160}, {x: 256, y: 160}, {x: 272, y: 160},
  {x: 400, y: 400}, {x: 416, y: 400}, {x: 432, y: 400},
  {x: 160, y: 608}, {x: 176, y: 608}, {x: 192, y: 608}
];

const cabin = { x: 520, y: 560, w: 96, h: 80 };

const acorns = [
  {x: 136, y: 168, collected: false},
  {x: 216, y: 120, collected: false},
  {x: 360, y: 168, collected: false},
  {x: 520, y: 184, collected: false},
  {x: 632, y: 168, collected: false},
  {x: 248, y: 344, collected: false},
  {x: 520, y: 344, collected: false},
  {x: 168, y: 536, collected: false},
  {x: 344, y: 552, collected: false},
  {x: 472, y: 648, collected: false}
];

const slimes = [
  { x: 300, y: 200, alive: true, vx: 0.4, vy: 0.2, timer: 0 },
  { x: 500, y: 400, alive: true, vx: -0.35, vy: 0.3, timer: 0 },
  { x: 700, y: 300, alive: true, vx: 0.25, vy: -0.4, timer: 0 }
];

const projectiles = [];

let gameOver = false;

// ---------------- GAME HELPERS ----------------
function restartGame() {
  player.x = 120;
  player.y = 120;
  player.dir = "down";
  player.step = 0;
  player.moving = false;
  player.castCooldown = 0;
  player.hp = 3;
  player.invuln = 0;

  projectiles.length = 0;

  slimes.length = 0;
  slimes.push(
    { x: 300, y: 200, alive: true, vx: 0.4, vy: 0.2, timer: 0 },
    { x: 500, y: 400, alive: true, vx: -0.35, vy: 0.3, timer: 0 },
    { x: 700, y: 300, alive: true, vx: 0.25, vy: -0.4, timer: 0 }
  );

  for (const a of acorns) a.collected = false;

  joystickTouchId = null;
  attackTouchId = null;
  joystickActive = false;
  joystickDX = 0;
  joystickDY = 0;
  attackPressed = false;

  gameOver = false;
}

function castSpell() {
  if (player.castCooldown > 0 || gameOver) return;

  let vx = 0;
  let vy = 0;

  if (player.dir === "down") vy = 3.5;
  if (player.dir === "up") vy = -3.5;
  if (player.dir === "left") vx = -3.5;
  if (player.dir === "right") vx = 3.5;

  projectiles.push({
    x: player.x,
    y: player.y - 2,
    vx,
    vy,
    life: 70
  });

  player.castCooldown = 20;
}

function rectsOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
  return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
}

function addBlockedRect(x, y, w, h) {
  blocked.push({x, y, w, h});
}

for (const t of trees) addBlockedRect(t.x - 6, t.y + 10, 12, 10);
for (const b of bushes) addBlockedRect(b.x - 8, b.y - 4, 16, 10);
addBlockedRect(cabin.x + 8, cabin.y + 36, cabin.w - 16, cabin.h - 36);

function canMoveTo(nx, ny) {
  const px = nx - player.w / 2;
  const py = ny - player.h / 2;

  for (const r of blocked) {
    if (rectsOverlap(px, py, player.w, player.h, r.x, r.y, r.w, r.h)) return false;
  }

  if (px < 0 || py < 0 || px + player.w > WORLD_W || py + player.h > WORLD_H) return false;
  return true;
}

function updateProjectiles() {
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const p = projectiles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life--;

    for (const s of slimes) {
      if (!s.alive) continue;

      const d = Math.hypot(p.x - s.x, p.y - s.y);
      if (d < 10) {
        s.alive = false;
        p.life = 0;
      }
    }

    if (p.x < 0 || p.y < 0 || p.x > WORLD_W || p.y > WORLD_H || p.life <= 0) {
      projectiles.splice(i, 1);
    }
  }
}

function updateSlimes() {
  for (const s of slimes) {
    if (!s.alive) continue;

    s.timer--;
    if (s.timer <= 0) {
      s.timer = 40 + Math.floor(Math.random() * 50);

      const dx = player.x - s.x;
      const dy = player.y - s.y;
      const dist = Math.hypot(dx, dy);

      if (dist < 120) {
        s.vx = (dx / dist) * 0.55;
        s.vy = (dy / dist) * 0.55;
      } else {
        const angle = Math.random() * Math.PI * 2;
        s.vx = Math.cos(angle) * 0.45;
        s.vy = Math.sin(angle) * 0.45;
      }
    }

    s.x += s.vx;
    s.y += s.vy;

    if (s.x < 20 || s.x > WORLD_W - 20) s.vx *= -1;
    if (s.y < 20 || s.y > WORLD_H - 20) s.vy *= -1;

    const d = Math.hypot(player.x - s.x, player.y - s.y);
    if (d < 14 && player.invuln <= 0) {
      player.hp--;
      player.invuln = 60;

      const knockX = player.x - s.x;
      const knockY = player.y - s.y;
      const knockLen = Math.hypot(knockX, knockY) || 1;

      player.x += (knockX / knockLen) * 10;
      player.y += (knockY / knockLen) * 10;

      if (player.hp <= 0) {
        player.hp = 0;
        gameOver = true;
      }
    }
  }
}

// ---------------- UPDATE ----------------
function update() {
  if (!gameOver) {
    let dx = 0;
    let dy = 0;

    if (joystickActive) {
      dx = joystickDX / 38;
      dy = joystickDY / 38;

      const len = Math.hypot(dx, dy);
      if (len > 1) {
        dx /= len;
        dy /= len;
      }

      if (Math.hypot(joystickDX, joystickDY) < 6) {
        dx = 0;
        dy = 0;
      }
    }

    player.moving = dx !== 0 || dy !== 0;

    if (Math.abs(dx) > Math.abs(dy)) {
      player.dir = dx > 0 ? "right" : dx < 0 ? "left" : player.dir;
    } else if (Math.abs(dy) > 0) {
      player.dir = dy > 0 ? "down" : "up";
    }

    const mx = dx * player.speed;
    const my = dy * player.speed;

    if (canMoveTo(player.x + mx, player.y)) player.x += mx;
    if (canMoveTo(player.x, player.y + my)) player.y += my;

    if (mx !== 0 || my !== 0) player.step += 0.18;
    if (player.castCooldown > 0) player.castCooldown--;
    if (player.invuln > 0) player.invuln--;

    for (const a of acorns) {
      if (!a.collected) {
        const d = Math.hypot(player.x - a.x, player.y - a.y);
        if (d < 12) a.collected = true;
      }
    }

    updateProjectiles();
    updateSlimes();
  }

  camera.x = Math.max(0, Math.min(WORLD_W - GAME_W, player.x - GAME_W / 2));
  camera.y = Math.max(0, Math.min(WORLD_H - GAME_H, player.y - GAME_H / 2));
}

// ---------------- DRAW HELPERS ----------------
function r(x, y, w, h, c) {
  ctx.fillStyle = c;
  ctx.fillRect(Math.floor(x), Math.floor(y), Math.floor(w), Math.floor(h));
}

function drawGround() {
  const startX = Math.floor(camera.x / TILE) * TILE;
  const startY = Math.floor(camera.y / TILE) * TILE;
  const endX = startX + GAME_W + TILE;
  const endY = startY + GAME_H + TILE;

  for (let y = startY; y < endY; y += TILE) {
    for (let x = startX; x < endX; x += TILE) {
      const sx = x - camera.x;
      const sy = y - camera.y;

      r(
        sx,
        sy,
        TILE,
        TILE,
        ((Math.floor(x / TILE) + Math.floor(y / TILE)) % 2 === 0) ? "#71c95b" : "#68b852"
      );

      r(sx + 3, sy + 5, 1, 1, "#97d77b");
      r(sx + 11, sy + 9, 1, 1, "#97d77b");
      r(sx + 7, sy + 13, 1, 1, "#5aa848");
    }
  }

  const paths = [
    {x: 90, y: 110, w: 110, h: 14},
    {x: 180, y: 110, w: 14, h: 110},
    {x: 180, y: 206, w: 180, h: 14},
    {x: 350, y: 206, w: 14, h: 180},
    {x: 350, y: 372, w: 190, h: 14}
  ];

  for (const p of paths) {
    r(p.x - camera.x, p.y - camera.y, p.w, p.h, "#c9ad67");
    for (let i = 0; i < p.w; i += 8) {
      for (let j = 0; j < p.h; j += 8) {
        r(p.x - camera.x + i + 2, p.y - camera.y + j + 2, 2, 2, "#b79656");
      }
    }
  }
}

function drawTreeBase(t) {
  const sx = t.x - camera.x;
  const sy = t.y - camera.y;
  r(sx - 4, sy + 8, 8, 10, "#7a4a21");
  r(sx - 2, sy + 10, 4, 8, "#915726");
}

function drawTreeTop(t, alpha = 1) {
  const sx = t.x - camera.x;
  const sy = t.y - camera.y;
  ctx.save();
  ctx.globalAlpha = alpha;
  r(sx - 18, sy - 18, 36, 36, "#1f6c2c");
  r(sx - 14, sy - 22, 28, 8, "#2f8534");
  r(sx - 22, sy - 6, 10, 14, "#2f8534");
  r(sx + 12, sy - 6, 10, 14, "#2f8534");
  r(sx - 8, sy + 10, 16, 8, "#2f8534");
  r(sx - 10, sy - 10, 4, 4, "#5fb95b");
  r(sx + 6, sy - 4, 4, 4, "#5fb95b");
  ctx.restore();
}

function drawBush(b) {
  const sx = b.x - camera.x;
  const sy = b.y - camera.y;
  r(sx - 8, sy - 6, 16, 10, "#2b7a34");
  r(sx - 6, sy - 8, 12, 4, "#419744");
}

function drawCabinBase() {
  const sx = cabin.x - camera.x;
  const sy = cabin.y - camera.y;
  r(sx + 8, sy + 34, cabin.w - 16, cabin.h - 34, "#8d5b2c");
  r(sx + 8, sy + 40, cabin.w - 16, 4, "#6f451f");
  r(sx + 8, sy + 52, cabin.w - 16, 4, "#6f451f");
  r(sx + 36, sy + 48, 20, 32, "#5a3518");
  r(sx + 40, sy + 52, 12, 28, "#74451f");
  r(sx + 44, sy + 64, 4, 4, "#c4a46a");
  r(sx + 14, sy + 70, cabin.w - 28, 6, "#4b2f18");
}

function drawCabinRoof(alpha = 1) {
  const sx = cabin.x - camera.x;
  const sy = cabin.y - camera.y;
  ctx.save();
  ctx.globalAlpha = alpha;
  r(sx, sy + 20, cabin.w, 18, "#7f2d2f");
  r(sx + 8, sy + 10, cabin.w - 16, 12, "#923636");
  r(sx + 16, sy, cabin.w - 32, 12, "#a64646");
  r(sx + 58, sy - 8, 10, 22, "#8c8c8c");
  r(sx + 60, sy - 10, 6, 4, "#b6b6b6");
  ctx.restore();
}

function drawAcorn(a) {
  const sx = a.x - camera.x;
  const sy = a.y - camera.y;
  r(sx - 4, sy - 1, 8, 7, "#c78f2f");
  r(sx - 3, sy - 4, 6, 4, "#9b6a20");
  r(sx + 1, sy - 6, 1, 2, "#6e4214");
}

function drawProjectile(p) {
  const sx = Math.floor(p.x - camera.x);
  const sy = Math.floor(p.y - camera.y);

  r(sx - 3, sy - 3, 6, 6, "#36cfff");
  r(sx - 2, sy - 2, 4, 4, "#bff7ff");

  if (Math.abs(p.vx) > 0) {
    r(sx - (p.vx > 0 ? 7 : -1), sy - 1, 4, 2, "rgba(54,207,255,0.6)");
  }
  if (Math.abs(p.vy) > 0) {
    r(sx - 1, sy - (p.vy > 0 ? 7 : -1), 2, 4, "rgba(54,207,255,0.6)");
  }
}

function drawSlime(s) {
  if (!s.alive) return;

  const sx = Math.floor(s.x - camera.x);
  const sy = Math.floor(s.y - camera.y);

  r(sx - 6, sy - 4, 12, 8, "#4caf50");
  r(sx - 5, sy + 2, 10, 3, "#388e3c");
  r(sx - 3, sy - 1, 2, 2, "#111");
  r(sx + 1, sy - 1, 2, 2, "#111");
}

function drawHeart(x, y, filled = true) {
  const c1 = filled ? "#ff4d6d" : "#777";
  const c2 = filled ? "#c9184a" : "#555";

  r(x + 1, y, 2, 2, c1);
  r(x + 5, y, 2, 2, c1);
  r(x, y + 2, 8, 2, c1);
  r(x + 1, y + 4, 6, 2, c2);
  r(x + 2, y + 6, 4, 2, c2);
  r(x + 3, y + 8, 2, 2, c2);
}

function drawPlayer() {
  const sx = Math.floor(player.x - camera.x);
  const sy = Math.floor(player.y - camera.y);
  const bob = player.moving ? (Math.sin(player.step * 2) > 0 ? 1 : 0) : 0;

  if (player.invuln > 0 && Math.floor(player.invuln / 4) % 2 === 0) return;

  r(sx - 5, sy + 7, 10, 2, "rgba(0,0,0,0.22)");

  if (player.dir === "left") {
    r(sx - 8, sy - 6 + bob, 2, 18, "#5a381e");
    r(sx - 9, sy - 8 + bob, 4, 4, "#4cc9ff");
    r(sx - 8, sy - 7 + bob, 2, 2, "#bdf1ff");
  } else {
    r(sx + 6, sy - 6 + bob, 2, 18, "#5a381e");
    r(sx + 5, sy - 8 + bob, 4, 4, "#4cc9ff");
    r(sx + 6, sy - 7 + bob, 2, 2, "#bdf1ff");
  }

  if (player.dir === "up") {
    r(sx - 6, sy - 9 + bob, 12, 4, "#1b3f8b");
    r(sx - 5, sy - 13 + bob, 10, 4, "#2452b0");
    r(sx - 3, sy - 16 + bob, 6, 3, "#2e63cf");
  } else {
    r(sx - 7, sy - 7 + bob, 14, 3, "#1b3f8b");
    r(sx - 5, sy - 11 + bob, 10, 4, "#2452b0");
    r(sx - 2, sy - 15 + bob, 6, 4, "#2e63cf");
  }

  if (player.dir === "up") {
    r(sx - 4, sy - 4 + bob, 8, 5, "#8a5a3a");
  } else {
    r(sx - 4, sy - 4 + bob, 8, 6, "#f0c79a");
  }

  if (player.dir !== "up") {
    r(sx - 4, sy - 1 + bob, 8, 6, "#e9edf2");
    r(sx - 3, sy + 4 + bob, 6, 3, "#d8dde5");
    r(sx - 1, sy + 6 + bob, 2, 2, "#cfd5de");
  }

  r(sx - 6, sy + 1 + bob, 12, 9, "#1f4fa8");
  r(sx - 5, sy + 2 + bob, 10, 7, "#275fc2");
  r(sx - 2, sy + 3 + bob, 4, 3, "#4b7fe0");

  r(sx - 6, sy + 7 + bob, 12, 2, "#6b431f");
  r(sx - 1, sy + 7 + bob, 2, 2, "#d8a13a");

  if (player.dir === "left") {
    r(sx - 8, sy + 2 + bob, 3, 5, "#275fc2");
    r(sx + 5, sy + 2 + bob, 2, 5, "#275fc2");
  } else if (player.dir === "right") {
    r(sx - 7, sy + 2 + bob, 2, 5, "#275fc2");
    r(sx + 5, sy + 2 + bob, 3, 5, "#275fc2");
  } else {
    r(sx - 7, sy + 2 + bob, 2, 5, "#275fc2");
    r(sx + 5, sy + 2 + bob, 2, 5, "#275fc2");
  }

  if (player.dir === "left") {
    r(sx - 9, sy + 5 + bob, 2, 2, "#f0c79a");
  } else {
    r(sx + 7, sy + 5 + bob, 2, 2, "#f0c79a");
  }

  const stepA = player.moving && Math.sin(player.step * 2) > 0 ? 1 : 0;
  const stepB = player.moving && Math.sin(player.step * 2) <= 0 ? 1 : 0;

  r(sx - 5, sy + 10 + bob, 4, 3, "#1b3f8b");
  r(sx + 1, sy + 10 + bob, 4, 3, "#1b3f8b");

  r(sx - 4, sy + 13 + bob + stepA, 2, 4, "#6b431f");
  r(sx + 2, sy + 13 + bob + stepB, 2, 4, "#6b431f");

  r(sx - 5, sy + 16 + bob + stepA, 3, 1, "#3b2412");
  r(sx + 2, sy + 16 + bob + stepB, 3, 1, "#3b2412");
}

function drawJoystick() {
  if (!joystickActive) return;

  ctx.save();
  ctx.globalAlpha = 0.85;

  ctx.beginPath();
  ctx.arc(joystickStartX, joystickStartY, 42, 0, Math.PI * 2);
  ctx.fillStyle = "rgba(255,255,255,0.14)";
  ctx.fill();

  ctx.beginPath();
  ctx.arc(joystickStartX + joystickDX, joystickStartY + joystickDY, 20, 0, Math.PI * 2);
  ctx.fillStyle = "rgba(76,201,255,0.55)";
  ctx.fill();

  ctx.restore();
}

function drawAttackButton() {
  if (gameOver) return;

  const b = getAttackButtonScreen();

  ctx.save();
  ctx.globalAlpha = 0.9;

  ctx.beginPath();
  ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
  ctx.fillStyle = attackPressed ? "rgba(90,120,255,0.65)" : "rgba(255,255,255,0.18)";
  ctx.fill();

  ctx.beginPath();
  ctx.arc(b.x, b.y, b.r - 8, 0, Math.PI * 2);
  ctx.fillStyle = attackPressed ? "rgba(76,201,255,0.85)" : "rgba(76,201,255,0.35)";
  ctx.fill();

  ctx.fillStyle = "#ffffff";
  ctx.font = "12px monospace";
  ctx.fillText("MAGIC", b.x - 18, b.y + 4);

  ctx.restore();
}

function drawWorld() {
  drawGround();

  for (const b of bushes) drawBush(b);
  for (const t of trees) drawTreeBase(t);
  drawCabinBase();

  for (const a of acorns) {
    if (!a.collected) drawAcorn(a);
  }

  for (const p of projectiles) drawProjectile(p);
  for (const s of slimes) drawSlime(s);

  drawPlayer();

  for (const t of trees) {
    const fade = (Math.abs(player.x - t.x) < 20 && Math.abs(player.y - (t.y + 4)) < 20) ? 0.45 : 1;
    drawTreeTop(t, fade);
  }

  const nearCabin = (
    player.x > cabin.x &&
    player.x < cabin.x + cabin.w &&
    player.y > cabin.y + 8 &&
    player.y < cabin.y + 42
  );
  drawCabinRoof(nearCabin ? 0.45 : 1);

  const collected = acorns.filter(a => a.collected).length;
  const livingSlimes = slimes.filter(s => s.alive).length;

  r(4, 4, 96, 22, "rgba(255,255,255,0.55)");
  ctx.fillStyle = "#111";
  ctx.font = "8px monospace";
  ctx.fillText(`ACORNS ${collected}/10`, 8, 14);
  ctx.fillText(`SLIMES ${livingSlimes}`, 8, 22);

  for (let i = 0; i < 3; i++) {
    drawHeart(68 + i * 10, 8, i < player.hp);
  }

  if (gameOver) {
    r(52, 54, 152, 34, "rgba(0,0,0,0.7)");
    r(54, 56, 148, 30, "rgba(255,255,255,0.8)");
    ctx.fillStyle = "#111";
    ctx.font = "12px monospace";
    ctx.fillText("GAME OVER", 91, 68);
    ctx.font = "8px monospace";
    ctx.fillText("TAP TO RESTART", 88, 80);
  } else if (collected === 10) {
    r(72, 62, 112, 18, "rgba(255,255,255,0.75)");
    ctx.fillStyle = "#111";
    ctx.font = "10px monospace";
    ctx.fillText("ALL ACORNS FOUND", 82, 74);
  }
}

function render() {
  update();

  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const scale = Math.min(canvas.width / GAME_W, canvas.height / GAME_H);
  const drawW = GAME_W * scale;
  const drawH = GAME_H * scale;
  const offsetX = (canvas.width - drawW) / 2;
  const offsetY = (canvas.height - drawH) / 2;

  ctx.save();
  ctx.translate(offsetX, offsetY);
  ctx.scale(scale, scale);
  drawWorld();
  ctx.restore();

  drawJoystick();
  drawAttackButton();

  requestAnimationFrame(render);
}

render();
</script>
</body>
</html>
