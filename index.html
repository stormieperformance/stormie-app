<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Storm Kolmodin — Stormieperformance</title>
  <meta name="description" content="Storm Kolmodin. Stormie Performance." />
  <link rel="canonical" href="https://stormieperformance.com" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0c0c0b;
      --text: #e8e4dc;
      --muted: rgba(232,228,220,0.42);
      --muted2: rgba(232,228,220,0.22);
      --line: rgba(232,228,220,0.08);
      --gold: #c9a96e;
      --gold-dim: rgba(201,169,110,0.18);
      --sans: 'DM Sans', sans-serif;
      --serif: 'Cormorant Garamond', serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      position: relative;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.8s ease, transform 0.8s ease;
    }

    body.page-loaded {
      opacity: 1;
      transform: translateY(0);
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      opacity: 0.055;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 180px 180px;
    }

    .page {
      position: relative;
      z-index: 1;
      max-width: 1080px;
      margin: 0 auto;
      padding: 0 48px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 28px 0;
      border-bottom: 1px solid var(--line);
    }

    .topbar-left,
    .topbar-right {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted2);
    }

    .hero {
      flex: 1;
      display: flex;
      align-items: center;
      padding: 80px 0 100px;
    }

    .hero-inner {
      width: 100%;
    }

    .hero-label {
      display: inline-block;
      font-size: 10px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 36px;
      white-space: nowrap;
      opacity: 0;
      clip-path: inset(0 100% 0 0);
      animation: revealLabel 1.4s cubic-bezier(0.22, 1, 0.36, 1) 0.2s forwards;
    }

    .hero-title {
      font-family: var(--serif);
      font-size: clamp(72px, 12vw, 164px);
      font-weight: 300;
      line-height: 0.9;
      letter-spacing: -0.03em;
      margin-bottom: 56px;
      opacity: 0;
      transform: translateY(10px);
      animation: fadeTitle 1.1s ease 1.3s forwards;
    }

    .hero-title .thin { color: var(--text); }
    .hero-title .italic { color: var(--muted); font-style: italic; }

    .hero-bottom {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 32px;
    }

    .hero-desc {
      max-width: 420px;
      font-size: 14px;
      line-height: 1.85;
      color: var(--muted);
      font-weight: 300;
      opacity: 0;
      transform: translateY(10px);
      animation: fadeContent 1s ease 2.2s forwards;
    }

    .hero-actions {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 16px;
      opacity: 0;
      transform: translateY(10px);
      animation: fadeContent 1s ease 2.2s forwards;
    }

    .enter-btn {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: var(--text);
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 14px 20px;
      background: rgba(255,255,255,0.012);
      border: 1px solid rgba(201,169,110,0.28); /* 🔥 fix */
      overflow: hidden;
      isolation: isolate;
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.01),
        0 0 0 1px rgba(201,169,110,0.02);
      transition: all 0.35s ease;
    }

    .enter-btn::after {
      content: "";
      position: absolute;
      inset: 0;
      border: 1px solid rgba(255,255,255,0.025);
      z-index: 0;
      pointer-events: none;
    }

    /* 🔥 GULD FIX */
    .enter-btn::before {
      content: "";
      position: absolute;
      inset: 0;
      padding: 1px;
      background:
        linear-gradient(
          90deg,
          rgba(201,169,110,0.35) 0%,
          rgba(201,169,110,0.85) 12%,
          rgba(201,169,110,0.45) 25%,
          rgba(201,169,110,0.30) 40%,
          rgba(201,169,110,0.95) 50%,
          rgba(201,169,110,0.30) 65%,
          rgba(201,169,110,0.85) 82%,
          rgba(201,169,110,0.35) 100%
        );
      background-size: 260% 100%;
      -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      animation:
        premiumEdgeDrift 18s linear infinite,
        premiumEdgeBreath 8s ease-in-out infinite;
      filter:
        drop-shadow(0 0 3px rgba(201,169,110,0.12))
        drop-shadow(0 0 10px rgba(201,169,110,0.10));
      opacity: 0.85;
      z-index: 1;
      pointer-events: none;
    }

    .enter-btn span {
      position: relative;
      z-index: 2;
    }

    .enter-btn:hover {
      transform: translateY(-1px);
      border-color: rgba(201,169,110,0.45);
      box-shadow:
        0 0 20px rgba(201,169,110,0.08),
        0 0 40px rgba(201,169,110,0.05);
    }

    footer {
      padding: 24px 0;
      border-top: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
    }

    @keyframes premiumEdgeDrift {
      0% { background-position: 0% 50%; }
      100% { background-position: 260% 50%; }
    }

    @keyframes premiumEdgeBreath {
      0%, 100% { opacity: 0.65; }
      50% { opacity: 0.9; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div class="topbar-left">Storm Kolmodin</div>
      <div class="topbar-right"></div>
    </div>

    <section class="hero">
      <div class="hero-inner">
        <p class="hero-label">Stormie Performance By</p>

        <h1 class="hero-title">
          <span class="thin">Storm</span><br>
          <span class="italic">Kolmodin</span>
        </h1>

        <div class="hero-bottom">
          <p class="hero-desc">
            Building digital infrastructure for sports brands.
          </p>

          <div class="hero-actions">
            <a class="enter-btn" href="https://stormieperformance.com">
              <span>Enter Stormie Performance</span>
            </a>
          </div>
        </div>
      </div>
    </section>

    <footer>
      <div class="footer-left">Storm Kolmodin</div>
      <div class="footer-right">Stormie Performance</div>
    </footer>
  </div>

  <script>
    window.addEventListener('load', () => {
      document.body.classList.add('page-loaded');
    });
  </script>
</body>
</html>
