<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>STORMIĒ</title>

  <style>
    :root{
      --text:#0f0f10;
      --line:rgba(0,0,0,0.10);
      --glass2:rgba(255,255,255,0.92);
      --shadow:0 30px 90px rgba(0,0,0,0.18);
      --motion:cubic-bezier(.22,1,.36,1);
    }

    *{ margin:0; padding:0; box-sizing:border-box; }
    html,body{ height:100%; }

    body{
      background:#fff;
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;
      display:flex;
      justify-content:center;
      align-items:center;
      text-align:center;
      overflow:hidden;
    }

    .app{
      width:100%;
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      transition:filter .28s var(--motion);
    }
