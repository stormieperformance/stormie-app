<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Storm Kolmodin — Stormieperformance</title>
  <meta name="description" content="Storm Kolmodin. Stormie Performance." />
  <link rel="canonical" href="https://stormieperformance.com" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0c0c0b;
      --text: #e8e4dc;
      --muted: rgba(232,228,220,0.42);
      --muted2: rgba(232,228,220,0.22);
      --line: rgba(232,228,220,0.08);
      --gold: #c9a96e;
      --gold-dim: rgba(201,169,110,0.18);
      --sans: 'DM Sans', sans-serif;
      --serif: 'Cormorant Garamond', serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      position: relative;

      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.8s ease, transform 0.8s ease;
    }

    body.page-loaded {
      opacity: 1;
      transform: translateY(0);
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      opacity: 0.055;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 180px 180px;
    }

    .page {
      position: relative;
      z-index: 1;
      max-width: 1080px;
      margin: 0 auto;
      padding: 0 48px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 28px 0;
      border-bottom: 1px solid var(--line);
    }

    .topbar-left,
    .topbar-right {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted2);
    }

    .hero {
      flex: 1;
      display: flex;
      align-items: center;
      padding: 80px 0 100px;
    }

    .hero-inner {
      width: 100%;
    }

    .hero-label {
      display: inline-block;
      font-size: 10px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 36px;
      white-space: nowrap;
      overflow: hidden;
      width: 0;
      opacity: 0;
      animation: revealLabel 1.4s cubic-bezier(0.22, 1, 0.36, 1) 0.2s forwards;
    }

    .hero-title {
      font-family: var(--serif);
      font-size: clamp(72px, 12vw, 164px);
      font-weight: 300;
      line-height: 0.9;
      letter-spacing: -0.03em;
      margin-bottom: 56px;

      opacity: 0;
      transform: translateY(10px);
      animation: fadeTitle 1.1s ease 1.3s forwards;
    }

    .hero-title .thin { color: var(--text); }
    .hero-title .italic { color: var(--muted); font-style: italic; }

    .hero-bottom {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 32px;
    }

    .hero-desc {
      max-width: 420px;
      font-size: 14px;
      line-height: 1.85;
      color: var(--muted);
      font-weight: 300;
    }

    .hero-actions {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 16px;
    }

    .enter-btn {
      display: inline-block;
      text-decoration: none;
      color: var(--text);
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 14px 20px;
      border: 1px solid rgba(201,169,110,0.32);
      background: transparent;
      transition: border-color 0.2s, color 0.2s, background 0.2s, transform 0.2s;
    }

    .enter-btn:hover {
      color: var(--gold);
      border-color: var(--gold);
      background: var(--gold-dim);
      transform: translateY(-1px);
    }

    .hero-meta {
      font-family: var(--serif);
      font-size: 14px;
      font-style: italic;
      color: var(--muted2);
    }

    footer {
      padding: 24px 0;
      border-top: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer-left {
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted2);
    }

    .footer-right {
      font-family: var(--serif);
      font-size: 13px;
      font-style: italic;
      color: var(--muted2);
    }

    @keyframes revealLabel {
      from {
        width: 0;
        opacity: 0;
      }
      to {
        width: 30ch;
        opacity: 1;
      }
    }

    @keyframes fadeTitle {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 768px) {
      .page { padding: 0 24px; }
      .hero { padding: 70px 0 80px; }
      .hero-bottom { flex-direction: column; align-items: flex-start; }
      .hero-actions { align-items: flex-start; }
      footer { flex-direction: column; gap: 8px; text-align: center; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div class="topbar-left">Storm Kolmodin</div>
      <div class="topbar-right">Stockholm</div>
    </div>

    <section class="hero">
      <div class="hero-inner">
        <p class="hero-label">Stormie Performance By</p>

        <h1 class="hero-title">
          <span class="thin">Storm</span><br>
          <span class="italic">Kolmodin</span>
        </h1>

        <div class="hero-bottom">
          <p class="hero-desc">
            Building digital infrastructure for sports brands. Websites, training apps, e-commerce and client systems — built to your brand, your sport, your clients.
          </p>

          <div class="hero-actions">
            <a class="enter-btn" href="https://stormieperformance.com">Enter Stormie Performance</a>
            <div class="hero-meta">Storm Kolmodin</div>
          </div>
        </div>
      </div>
    </section>

    <footer>
      <div class="footer-left">Storm Kolmodin</div>
      <div class="footer-right">Stormie Performance</div>
    </footer>
  </div>

  <script>
    window.addEventListener('load', () => {
      document.body.classList.add('page-loaded');
    });
  </script>
</body>
</html>
