// AUDIO
let audioCtx = null;
let audioUnlocked = false;

function ensureAudio() {
  if (!audioCtx) {
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return null;
    audioCtx = new AC();
  }

  if (audioCtx.state === "suspended") {
    audioCtx.resume();
  }

  audioUnlocked = true;
  return audioCtx;
}

function safeNow() {
  const ac = ensureAudio();
  if (!ac) return null;
  return ac.currentTime;
}

function makeNoiseBuffer() {
  const ac = ensureAudio();
  if (!ac) return null;

  const buffer = ac.createBuffer(1, ac.sampleRate * 0.12, ac.sampleRate);
  const data = buffer.getChannelData(0);

  for (let i = 0; i < data.length; i++) {
    data[i] = Math.random() * 2 - 1;
  }

  return buffer;
}

let noiseBuffer = null;

function playTone(type, freqStart, freqEnd, duration, volume = 0.05) {
  const ac = ensureAudio();
  if (!ac) return;

  const now = ac.currentTime;
  const osc = ac.createOscillator();
  const gain = ac.createGain();

  osc.type = type;
  osc.frequency.setValueAtTime(freqStart, now);
  osc.frequency.exponentialRampToValueAtTime(Math.max(40, freqEnd), now + duration);

  gain.gain.setValueAtTime(0.0001, now);
  gain.gain.exponentialRampToValueAtTime(volume, now + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);

  osc.connect(gain);
  gain.connect(ac.destination);

  osc.start(now);
  osc.stop(now + duration + 0.02);
}

function playNoise(duration = 0.06, volume = 0.03, hpFreq = 900) {
  const ac = ensureAudio();
  if (!ac) return;

  if (!noiseBuffer) noiseBuffer = makeNoiseBuffer();
  if (!noiseBuffer) return;

  const now = ac.currentTime;
  const src = ac.createBufferSource();
  const filter = ac.createBiquadFilter();
  const gain = ac.createGain();

  src.buffer = noiseBuffer;
  filter.type = "highpass";
  filter.frequency.setValueAtTime(hpFreq, now);

  gain.gain.setValueAtTime(volume, now);
  gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);

  src.connect(filter);
  filter.connect(gain);
  gain.connect(ac.destination);

  src.start(now);
  src.stop(now + duration);
}

function playPickupSound() {
  playTone("triangle", 720, 1080, 0.09, 0.03);
  setTimeout(() => playTone("triangle", 980, 1460, 0.08, 0.025), 35);
}

function playCastSound() {
  playTone("square", 620, 260, 0.08, 0.035);
  playNoise(0.04, 0.01, 1200);
}

function playHitSound() {
  playTone("square", 180, 120, 0.06, 0.03);
  playNoise(0.05, 0.012, 700);
}

function playKillSound() {
  playTone("sawtooth", 240, 90, 0.12, 0.04);
  setTimeout(() => playTone("triangle", 160, 70, 0.12, 0.03), 25);
}

function playChestSound() {
  playTone("square", 220, 300, 0.06, 0.03);
  setTimeout(() => playTone("square", 300, 420, 0.08, 0.035), 45);
  setTimeout(() => playTone("triangle", 520, 760, 0.1, 0.03), 85);
}

function playManaSound() {
  playTone("triangle", 500, 880, 0.08, 0.03);

}

function playClearSound() {
  playTone("triangle", 440, 660, 0.12, 0.03);
  setTimeout(() => playTone("triangle", 660, 990, 0.14, 0.03), 110);
  setTimeout(() => playTone("triangle", 990, 1480, 0.18, 0.03), 240);
}

// INPUT
let joystickTouchId = null;
let attackTouchId = null;
let useTouchId = null;
let joystickActive = false;
let joystickStartX = 0;
let joystickStartY = 0;
let joystickDX = 0;
let joystickDY = 0;
let attackPressed = false;
let usePressed = false;

function getAttackButtonScreen() {
  return {
    x: canvas.width - 72,
    y: canvas.height - 78,
    r: 42
  };
}

function getUseButtonScreen() {
  return {
    x: canvas.width - 92,
    y: canvas.height - 146,
    r: 28
  };
}

function isInsideAttackButton(x, y) {
  const b = getAttackButtonScreen();
  return Math.hypot(x - b.x, y - b.y) <= b.r;
}

function isInsideUseButton(x, y) {
  const b = getUseButtonScreen();
  return Math.hypot(x - b.x, y - b.y) <= b.r;
}

function handleTouchStart(t) {
  ensureAudio();

  if (isInsideAttackButton(t.clientX, t.clientY)) {
    attackTouchId = t.identifier;
    attackPressed = true;
    if (!gameOver && !gameWon) castSpell();
    return;
  }

  if (isInsideUseButton(t.clientX, t.clientY)) {
    useTouchId = t.identifier;
    usePressed = true;
    if (!gameOver && !gameWon) handleUse();
    return;
  }

  if (joystickTouchId === null) {
    joystickTouchId = t.identifier;
    joystickActive = true;
    joystickStartX = t.clientX;
    joystickStartY = t.clientY;
    joystickDX = 0;
    joystickDY = 0;
  }
}

function handleTouchMove(t) {
  if (t.identifier === joystickTouchId) {
    joystickDX = t.clientX - joystickStartX;
    joystickDY = t.clientY - joystickStartY;

    const maxRadius = 38;
    const len = Math.hypot(joystickDX, joystickDY);
    if (len > maxRadius) {
      joystickDX = (joystickDX / len) * maxRadius;
      joystickDY = (joystickDY / len) * maxRadius;
    }
  }
}

function handleTouchEnd(t) {
  if (t.identifier === joystickTouchId) {
    joystickTouchId = null;
    joystickActive = false;
    joystickDX = 0;
    joystickDY = 0;
  }

  if (t.identifier === attackTouchId) {
    attackTouchId = null;
    attackPressed = false;
  }

  if (t.identifier === useTouchId) {
    useTouchId = null;
    usePressed = false;
  }
}

canvas.addEventListener("touchstart", e => {
  if (gameOver || gameWon) {
    restartGame();
    return;
  }

  for (const t of e.changedTouches) handleTouchStart(t);
}, { passive: false });

canvas.addEventListener("touchmove", e => {
  for (const t of e.changedTouches) handleTouchMove(t);
  e.preventDefault();
}, { passive: false });

canvas.addEventListener("touchend", e => {
  for (const t of e.changedTouches) handleTouchEnd(t);
}, { passive: false });

canvas.addEventListener("touchcancel", e => {
  for (const t of e.changedTouches) handleTouchEnd(t);
}, { passive: false });

const projectiles = [];

let toastTimer = 0;

// RESET
function restartGame() {
  player.x = 120;
  player.y = 120;
  player.dir = "down";
  player.step = 0;
  player.moving = false;
  player.castCooldown = 0;
  player.hp = 3;
  player.invuln = 0;
  player.mana = player.maxMana;

  projectiles.length = 0;
  hitEffects.length = 0;
  diamonds.length = 0;
  diamondCount = 0;

  chest.opened = false;
  chest.diamondSpawned = false;

  slimes.length = 0;
  slimes.push(
    { x: 300, y: 200, alive: true, vx: 0.4, vy: 0.2, timer: 0, hitFlash: 0, deadTimer: 0 },
    { x: 500, y: 400, alive: true, vx: -0.35, vy: 0.3, timer: 0, hitFlash: 0, deadTimer: 0 },
    { x: 700, y: 300, alive: true, vx: 0.25, vy: -0.4, timer: 0, hitFlash: 0, deadTimer: 0 },
    { x: 420, y: 520, alive: true, vx: 0.3, vy: 0.35, timer: 0, hitFlash: 0, deadTimer: 0 },
    { x: 610, y: 220, alive: true, vx: -0.25, vy: 0.45, timer: 0, hitFlash: 0, deadTimer: 0 }
  );

  for (const a of acorns) a.collected = false;
  for (const b of manaBottles) b.collected = false;

  joystickTouchId = null;
  attackTouchId = null;
  useTouchId = null;
  joystickActive = false;
  joystickDX = 0;
  joystickDY = 0;
  attackPressed = false;
  usePressed = false;

  toastText = "";
  toastTimer = 0;

  gameOver = false;
  gameWon = false;
}

function showToast(text, duration = 70) {
  toastText = text;
  toastTimer = duration;
}

function castSpell() {
  if (player.castCooldown > 0 || gameOver || gameWon) return;
  if (player.mana <= 0) {
    showToast("NO MANA", 40);
    return;
  }

  let vx = 0;
  let vy = 0;

  if (player.dir === "down") vy = 3.5;
  if (player.dir === "up") vy = -3.5;
  if (player.dir === "left") vx = -3.5;
  if (player.dir === "right") vx = 3.5;

  projectiles.push({
    x: player.x,
    y: player.y - 2,
    vx,
    vy,
    life: 70
  });

  playCastSound();
  player.mana--;
  player.castCooldown = 20;
}

function getCollectedAcorns() {
  return acorns.filter(a => a.collected).length;
}

function getLivingSlimes() {
  return slimes.filter(s => s.alive).length;
}

function goalComplete() {
  return getCollectedAcorns() === 10 && diamondCount >= 1 && getLivingSlimes() === 0;
}

function nearChest() {
  return Math.hypot(player.x - chest.x, player.y - chest.y) < 18;
}

function nearCabinDoor() {
  const doorX = cabin.x + 46;
  const doorY = cabin.y + 70;
  return Math.hypot(player.x - doorX, player.y - doorY) < 20;
}

function nearestManaBottle() {
  let closest = null;
  let bestDist = 9999;

  for (const b of manaBottles) {
    if (b.collected) continue;
    const d = Math.hypot(player.x - b.x, player.y - b.y);
    if (d < 18 && d < bestDist) {
      bestDist = d;
      closest = b;
    }
  }

  return closest;
}

function handleUse() {
  const bottle = nearestManaBottle();

  if (bottle) {
    bottle.collected = true;
    player.mana = Math.min(player.maxMana, player.mana + 3);
    showToast("MANA +3", 55);
    spawnHitEffect(bottle.x, bottle.y, "#c8f3ff", "#4cc9ff");
    playManaSound();
    return;
  }

  if (!chest.opened && nearChest()) {
    openChest();
    return;
  }

  if (nearCabinDoor()) {
    if (goalComplete()) {
      gameWon = true;
      showToast("CABIN REACHED!", 120);
      playClearSound();
    } else {
      showToast("CABIN LOCKED", 50);
    }
  }
}

// HELPERS
function rectsOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
  return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
}

function addBlockedRect(x, y, w, h) {
  blocked.push({x, y, w, h});
}

for (const t of trees) addBlockedRect(t.x - 6, t.y + 10, 12, 10);
for (const b of bushes) addBlockedRect(b.x - 8, b.y - 4, 16, 10);
for (const rock of rocks) addBlockedRect(rock.x - rock.w / 2, rock.y - rock.h / 2, rock.w, rock.h);
for (const stump of stumps) addBlockedRect(stump.x - 6, stump.y - 4, 12, 10);
for (const f of fences) addBlockedRect(f.x, f.y, f.w, f.h);
addBlockedRect(pond.x + 8, pond.y + 8, pond.w - 16, pond.h - 16);
addBlockedRect(cabin.x + 8, cabin.y + 36, cabin.w - 16, cabin.h - 36);

function canMoveTo(nx, ny) {
  const px = nx - player.w / 2;
  const py = ny - player.h / 2;

  for (const r of blocked) {
    if (rectsOverlap(px, py, player.w, player.h, r.x, r.y, r.w, r.h)) return false;
  }

  if (px < 0 || py < 0 || px + player.w > WORLD_W || py + player.h > WORLD_H) return false;
  return true;
}

function r(x, y, w, h, c) {
  ctx.fillStyle = c;
  ctx.fillRect(Math.floor(x), Math.floor(y), Math.floor(w), Math.floor(h));
}

function spawnHitEffect(x, y, color1 = "#bff7ff", color2 = "#36cfff") {
  for (let i = 0; i < 8; i++) {
    hitEffects.push({
      x,
      y,
      vx: (Math.random() - 0.5) * 2.4,
      vy: (Math.random() - 0.5) * 2.4,
      life: 14 + Math.floor(Math.random() * 8),
      color: i % 2 === 0 ? color1 : color2
    });
  }
}

function openChest() {
  if (chest.opened) return;

  chest.opened = true;
  showToast("CHEST OPENED!", 65);
  playChestSound();

  if (!chest.diamondSpawned) {
    diamonds.push({
      x: chest.x,
      y: chest.y - 6,
      vx: 1.25,
      vy: -1.8,
      floatPhase: Math.random() * Math.PI * 2,
      collected: false,
      settling: true
    });

    chest.diamondSpawned = true;
    spawnHitEffect(chest.x, chest.y - 2, "#ffe6a7", "#ffd166");
    spawnHitEffect(chest.x, chest.y - 10, "#d9f3ff", "#62d6ff");
  }
}

// UPDATE
function updateProjectiles() {
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const p = projectiles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life--;

    for (const s of slimes) {
      if (!s.alive) continue;

      const d = Math.hypot(p.x - s.x, p.y - s.y);
      if (d < 10) {
        playHitSound();
        s.alive = false;
        s.hitFlash = 10;
        s.deadTimer = 10;
        p.life = 0;
        spawnHitEffect(s.x, s.y, "#ead8ff", "#9b5cff");
        setTimeout(() => playKillSound(), 20);
      }
    }

    if (p.x < 0 || p.y < 0 || p.x > WORLD_W || p.y > WORLD_H || p.life <= 0) {
      projectiles.splice(i, 1);
    }
  }
}

function updateDiamonds() {
  for (let i = diamonds.length - 1; i >= 0; i--) {
    const d = diamonds[i];

    if (d.settling) {
      d.x += d.vx;
      d.y += d.vy;
      d.vy += 0.14;
      d.vx *= 0.94;

      if (d.vy > 1.5) {
        d.vy = 0;
        d.vx = 0;
        d.settling = false;
      }
    }

    d.floatPhase += 0.12;

    if (!d.collected) {
      const dist = Math.hypot(player.x - d.x, player.y - d.y);
      if (dist < 12) {
        d.collected = true;
        diamondCount++;
        showToast("DIAMOND FOUND!", 70);
        spawnHitEffect(d.x, d.y, "#d9f3ff", "#62d6ff");
        playPickupSound();
        diamonds.splice(i, 1);
      }
    }
  }
}

function updateSlimes() {
  for (const s of slimes) {
    if (s.hitFlash > 0) s.hitFlash--;

    if (!s.alive) {
      if (s.deadTimer > 0) s.deadTimer--;
      continue;
    }

    s.timer--;
    if (s.timer <= 0) {
      s.timer = 40 + Math.floor(Math.random() * 50);

      const dx = player.x - s.x;
      const dy = player.y - s.y;
      const dist = Math.hypot(dx, dy);

      if (dist < 120) {
        s.vx = (dx / dist) * 0.55;
        s.vy = (dy / dist) * 0.55;
      } else {
        const angle = Math.random() * Math.PI * 2;
        s.vx = Math.cos(angle) * 0.45;
        s.vy = Math.sin(angle) * 0.45;
      }
    }

    s.x += s.vx;
    s.y += s.vy;

    if (s.x < 20 || s.x > WORLD_W - 20) s.vx *= -1;
    if (s.y < 20 || s.y > WORLD_H - 20) s.vy *= -1;

    const d = Math.hypot(player.x - s.x, player.y - s.y);
    if (d < 14 && player.invuln <= 0) {
      player.hp--;
      player.invuln = 60;
      spawnHitEffect(player.x, player.y, "#ffd1d9", "#ff4d6d");

      const knockX = player.x - s.x;
      const knockY = player.y - s.y;
      const knockLen = Math.hypot(knockX, knockY) || 1;

      player.x += (knockX / knockLen) * 10;
      player.y += (knockY / knockLen) * 10;

      if (player.hp <= 0) {
        player.hp = 0;
        gameOver = true;
      }
    }
  }
}

function updateHitEffects() {
  for (let i = hitEffects.length - 1; i >= 0; i--) {
    const e = hitEffects[i];
    e.x += e.vx;
    e.y += e.vy;
    e.life--;
    e.vx *= 0.94;
    e.vy *= 0.94;

    if (e.life <= 0) {
      hitEffects.splice(i, 1);
    }
  }
}

function update() {
  if (!gameOver && !gameWon) {
    let dx = 0;
    let dy = 0;

    if (joystickActive) {
      dx = joystickDX / 38;
      dy = joystickDY / 38;

      const len = Math.hypot(dx, dy);
      if (len > 1) {
        dx /= len;
        dy /= len;
      }

      if (Math.hypot(joystickDX, joystickDY) < 6) {
        dx = 0;
        dy = 0;
      }
    }

    player.moving = dx !== 0 || dy !== 0;

    if (Math.abs(dx) > Math.abs(dy)) {
      player.dir = dx > 0 ? "right" : dx < 0 ? "left" : player.dir;
    } else if (Math.abs(dy) > 0) {
      player.dir = dy > 0 ? "down" : "up";
    }

    const mx = dx * player.speed;
    const my = dy * player.speed;

    if (canMoveTo(player.x + mx, player.y)) player.x += mx;
    if (canMoveTo(player.x, player.y + my)) player.y += my;

    if (mx !== 0 || my !== 0) player.step += 0.18;
    if (player.castCooldown > 0) player.castCooldown--;
    if (player.invuln > 0) player.invuln--;
    if (toastTimer > 0) toastTimer--;

    for (const a of acorns) {
      if (!a.collected) {
        const d = Math.hypot(player.x - a.x, player.y - a.y);
        if (d < 12) {
          a.collected = true;
          playPickupSound();
        }
      }
    }

    updateProjectiles();
    updateDiamonds();
    updateSlimes();
    updateHitEffects();
  } else {
    if (toastTimer > 0) toastTimer--;
    updateHitEffects();
  }

  camera.x = Math.max(0, Math.min(WORLD_W - GAME_W, player.x - GAME_W / 2));
  camera.y = Math.max(0, Math.min(WORLD_H - GAME_H, player.y - GAME_H * 0.35));
}

// DRAW
function drawGround() {
  const startX = Math.floor(camera.x / TILE) * TILE;
  const startY = Math.floor(camera.y / TILE) * TILE;
  const endX = startX + GAME_W + TILE;
  const endY = startY + GAME_H + TILE;

  for (let y = startY; y < endY; y += TILE) {
    for (let x = startX; x < endX; x += TILE) {
      const sx = x - camera.x;
      const sy = y - camera.y;

      const checker = (Math.floor(x / TILE) + Math.floor(y / TILE)) % 2 === 0;
      const patch = ((Math.floor(x / 48) + Math.floor(y / 48)) % 3 === 0);

      let grass = checker ? "#71c95b" : "#68b852";
      if (patch) grass = checker ? "#6bbc57" : "#62ad4f";

      r(sx, sy, TILE, TILE, grass);

      r(sx + 3, sy + 5, 1, 1, "#97d77b");
      r(sx + 11, sy + 9, 1, 1, "#97d77b");
      r(sx + 7, sy + 13, 1, 1, "#5aa848");

      if ((Math.floor(x / 16) * 7 + Math.floor(y / 16) * 13) % 11 === 0) {
        r(sx + 5, sy + 7, 2, 1, "#4d9440");
        r(sx + 8, sy + 10, 1, 2, "#4d9440");
      }
    }
  }

  const paths = [
    {x: 90, y: 110, w: 110, h: 14},
    {x: 180, y: 110, w: 14, h: 110},
    {x: 180, y: 206, w: 180, h: 14},
    {x: 350, y: 206, w: 14, h: 180},
    {x: 350, y: 372, w: 190, h: 14}
  ];

  for (const p of paths) {
    r(p.x - camera.x, p.y - camera.y, p.w, p.h, "#c9ad67");
    for (let i = 0; i < p.w; i += 8) {
      for (let j = 0; j < p.h; j += 8) {
        r(p.x - camera.x + i + 2, p.y - camera.y + j + 2, 2, 2, "#b79656");
      }
    }
  }

  const dirtPatches = [
    { x: 118, y: 150, w: 34, h: 18 },
    { x: 302, y: 168, w: 28, h: 16 },
    { x: 468, y: 176, w: 26, h: 16 },
    { x: 222, y: 520, w: 36, h: 18 },
    { x: 454, y: 616, w: 28, h: 16 }
  ];

  for (const d of dirtPatches) {
    r(d.x - camera.x, d.y - camera.y, d.w, d.h, "#b8955b");
    r(d.x - camera.x + 4, d.y - camera.y + 3, d.w - 8, d.h - 6, "#c7a56b");
  }
}

function drawTreeBase(t) {
  const sx = t.x - camera.x;
  const sy = t.y - camera.y;
  r(sx - 4, sy + 8, 8, 10, "#7a4a21");
  r(sx - 2, sy + 10, 4, 8, "#915726");
}

function drawTreeTop(t, alpha = 1) {
  const sx = t.x - camera.x;
  const sy = t.y - camera.y;
  ctx.save();
  ctx.globalAlpha = alpha;
  r(sx - 18, sy - 18, 36, 36, "#1f6c2c");
  r(sx - 14, sy - 22, 28, 8, "#2f8534");
  r(sx - 22, sy - 6, 10, 14, "#2f8534");
  r(sx + 12, sy - 6, 10, 14, "#2f8534");
  r(sx - 8, sy + 10, 16, 8, "#2f8534");
  r(sx - 10, sy - 10, 4, 4, "#5fb95b");
  r(sx + 6, sy - 4, 4, 4, "#5fb95b");
  ctx.restore();
}

function drawBush(b) {
  const sx = b.x - camera.x;
  const sy = b.y - camera.y;
  r(sx - 8, sy - 6, 16, 10, "#2b7a34");
  r(sx - 6, sy - 8, 12, 4, "#419744");
}

function drawRock(rock) {
  const sx = Math.floor(rock.x - camera.x);
  const sy = Math.floor(rock.y - camera.y);

  r(sx - 6, sy - 4, 12, 8, "#7d8b8f");
  r(sx - 4, sy - 6, 8, 4, "#97a6aa");
  r(sx - 2, sy - 2, 2, 2, "#c8d2d4");
}

function drawStump(stump) {
  const sx = Math.floor(stump.x - camera.x);
  const sy = Math.floor(stump.y - camera.y);

  r(sx - 6, sy - 4, 12, 8, "#8a5a2f");
  r(sx - 4, sy - 2, 8, 4, "#a9703d");
  r(sx - 1, sy - 1, 2, 2, "#d6b07a");
}

function drawFlower(f) {
  const sx = Math.floor(f.x - camera.x);
  const sy = Math.floor(f.y - camera.y);

  r(sx, sy - 2, 1, 4, "#4d9440");
  r(sx - 1, sy - 3, 1, 1, f.c);
  r(sx + 1, sy - 3, 1, 1, f.c);
  r(sx, sy - 4, 1, 1, f.c);
  r(sx, sy - 2, 1, 1, "#fff");
}

function drawFence(f) {
  const sx = Math.floor(f.x - camera.x);
  const sy = Math.floor(f.y - camera.y);

  r(sx, sy, f.w, f.h, "#8a5a2f");

  if (f.w > f.h) {
    for (let i = 0; i < f.w; i += 12) {
      r(sx + i, sy - 4, 3, 10, "#6f451f");
    }
  } else {
    for (let i = 0; i < f.h; i += 12) {
      r(sx - 1, sy + i, 6, 3, "#6f451f");
    }
  }
}

function drawReed(reed) {
  const sx = Math.floor(reed.x - camera.x);
  const sy = Math.floor(reed.y - camera.y);

  r(sx, sy - 6, 1, 6, "#4f8f3c");
  r(sx + 2, sy - 8, 1, 8, "#5ea847");
  r(sx + 4, sy - 5, 1, 5, "#4f8f3c");
}

function drawPond() {
  const sx = pond.x - camera.x;
  const sy = pond.y - camera.y;

  r(sx - 4, sy - 4, pond.w + 8, pond.h + 8, "#d2b777");
  r(sx, sy, pond.w, pond.h, "#4ca6d8");
  r(sx + 6, sy + 6, pond.w - 12, pond.h - 12, "#66c3ef");

  r(sx + 18, sy + 16, 22, 4, "#bdefff");
  r(sx + 58, sy + 28, 18, 3, "#bdefff");
  r(sx + 82, sy + 56, 24, 4, "#bdefff");
  r(sx + 36, sy + 62, 14, 3, "#bdefff");

  r(sx + 10, sy + pond.h - 14, 18, 6, "#7bcf63");
  r(sx + pond.w - 30, sy + 10, 16, 6, "#7bcf63");
}

function drawCabinBase() {
  const sx = cabin.x - camera.x;
  const sy = cabin.y - camera.y;
  r(sx + 8, sy + 34, cabin.w - 16, cabin.h - 34, "#8d5b2c");
  r(sx + 8, sy + 40, cabin.w - 16, 4, "#6f451f");
  r(sx + 8, sy + 52, cabin.w - 16, 4, "#6f451f");
  r(sx + 36, sy + 48, 20, 32, "#5a3518");
  r(sx + 40, sy + 52, 12, 28, "#74451f");
  r(sx + 44, sy + 64, 4, 4, "#c4a46a");
  r(sx + 14, sy + 70, cabin.w - 28, 6, "#4b2f18");
}

function drawCabinRoof(alpha = 1) {
  const sx = cabin.x - camera.x;
  const sy = cabin.y - camera.y;
  ctx.save();
  ctx.globalAlpha = alpha;
  r(sx, sy + 20, cabin.w, 18, "#7f2d2f");
  r(sx + 8, sy + 10, cabin.w - 16, 12, "#923636");
  r(sx + 16, sy, cabin.w - 32, 12, "#a64646");
  r(sx + 58, sy - 8, 10, 22, "#8c8c8c");
  r(sx + 60, sy - 10, 6, 4, "#b6b6b6");
  ctx.restore();
}

function drawAcorn(a) {
  const sx = a.x - camera.x;
  const sy = a.y - camera.y;
  r(sx - 4, sy - 1, 8, 7, "#c78f2f");
  r(sx - 3, sy - 4, 6, 4, "#9b6a20");
  r(sx + 1, sy - 6, 1, 2, "#6e4214");
}

function drawManaBottle(b) {
  const sx = Math.floor(b.x - camera.x);
  const sy = Math.floor(b.y - camera.y);

  r(sx - 3, sy - 6, 6, 8, "#57d4ff");
  r(sx - 2, sy - 5, 4, 6, "#c9f6ff");
  r(sx - 1, sy - 8, 2, 2, "#7b4d26");
  r(sx - 2, sy + 2, 4, 1, "#1e8ec2");
}

function drawChest() {
  const sx = Math.floor(chest.x - camera.x);
  const sy = Math.floor(chest.y - camera.y);

  if (chest.opened) {
    r(sx - 8, sy + 1, 16, 5, "#7a4a21");
    r(sx - 6, sy + 2, 12, 3, "#915726");
    r(sx - 8, sy - 4, 16, 4, "#c58b2d");
    r(sx - 7, sy - 5, 14, 2, "#e1a93e");
    r(sx - 1, sy - 2, 2, 6, "#f5d26b");
  } else {
    r(sx - 8, sy - 3, 16, 10, "#8a5525");
    r(sx - 6, sy - 1, 12, 6, "#9e622b");
    r(sx - 8, sy - 5, 16, 4, "#c58b2d");
    r(sx - 7, sy - 6, 14, 2, "#e1a93e");
    r(sx - 1, sy - 2, 2, 6, "#f5d26b");
    r(sx - 2, sy, 4, 2, "#6b431f");
  }
}

function drawDiamond(d) {
  const sx = Math.floor(d.x - camera.x);
  const floatOffset = d.settling ? 0 : Math.sin(d.floatPhase) * 2;
  const sy = Math.floor(d.y - camera.y + floatOffset);

  r(sx, sy - 6, 2, 2, "#9ee8ff");
  r(sx - 2, sy - 4, 6, 2, "#7fdcff");
  r(sx - 4, sy - 2, 10, 4, "#55cfff");
  r(sx - 2, sy + 2, 6, 2, "#3cb8f0");
  r(sx, sy + 4, 2, 2, "#269ad6");

  r(sx, sy - 4, 1, 8, "#dff8ff");
  r(sx - 2, sy - 2, 1, 4, "#dff8ff");
  r(sx + 2, sy - 2, 1, 4, "#dff8ff");
}

function drawProjectile(p) {
  const sx = Math.floor(p.x - camera.x);
  const sy = Math.floor(p.y - camera.y);

  r(sx - 3, sy - 3, 6, 6, "#36cfff");
  r(sx - 2, sy - 2, 4, 4, "#bff7ff");

  if (Math.abs(p.vx) > 0) {
    r(sx - (p.vx > 0 ? 7 : -1), sy - 1, 4, 2, "rgba(54,207,255,0.6)");
  }
  if (Math.abs(p.vy) > 0) {
    r(sx - 1, sy - (p.vy > 0 ? 7 : -1), 2, 4, "rgba(54,207,255,0.6)");
  }
}

function drawHitEffect(e) {
  const sx = Math.floor(e.x - camera.x);
  const sy = Math.floor(e.y - camera.y);
  r(sx, sy, 2, 2, e.color);
}

function drawSlime(s) {
  if (!s.alive && s.deadTimer <= 0) return;

  const sx = Math.floor(s.x - camera.x);
  const sy = Math.floor(s.y - camera.y);

  const flash = s.hitFlash > 0;
  const body = flash ? "#ffffff" : "#9b5cff";
  const base = flash ? "#ead8ff" : "#5f2db8";

  r(sx - 6, sy - 4, 12, 8, body);
  r(sx - 5, sy + 2, 10, 3, base);
  r(sx - 3, sy - 1, 2, 2, "#111");
  r(sx + 1, sy - 1, 2, 2, "#111");
}

function drawHeartUI(x, y, filled = true) {
  const c1 = filled ? "#ff4d6d" : "#777";
  const c2 = filled ? "#c9184a" : "#555";

  ctx.fillStyle = c1;
  ctx.fillRect(x + 1, y, 2, 2);
  ctx.fillRect(x + 5, y, 2, 2);
  ctx.fillRect(x, y + 2, 8, 2);

  ctx.fillStyle = c2;
  ctx.fillRect(x + 1, y + 4, 6, 2);
  ctx.fillRect(x + 2, y + 6, 4, 2);
  ctx.fillRect(x + 3, y + 8, 2, 2);
}

function drawManaPipUI(x, y, filled = true) {
  const c1 = filled ? "#4cc9ff" : "#55707d";
  const c2 = filled ? "#c9f6ff" : "#425660";

  ctx.fillStyle = c1;
  ctx.fillRect(x + 1, y, 4, 2);
  ctx.fillRect(x, y + 2, 6, 4);

  ctx.fillStyle = c2;
  ctx.fillRect(x + 1, y + 6, 4, 2);

  ctx.fillStyle = "#e8fcff";
  ctx.fillRect(x + 2, y + 1, 2, 6);
}

function drawHUDScreen() {
  const collected = getCollectedAcorns();
  const livingSlimes = getLivingSlimes();

  const hudX = 12;
  const hudY = 86;

  ctx.fillStyle = "rgba(255,255,255,0.55)";
  ctx.fillRect(hudX, hudY, 148, 42);

  ctx.fillStyle = "#111";
  ctx.font = "8px monospace";
  ctx.fillText(`ACORNS ${collected}/10`, hudX + 4, hudY + 10);
  ctx.fillText(`SLIMES ${livingSlimes}`, hudX + 4, hudY + 18);
  ctx.fillText(`DIAMONDS ${diamondCount}`, hudX + 4, hudY + 26);
  ctx.fillText(`GOAL ${goalComplete() ? "CABIN" : "EXPLORE"}`, hudX + 4, hudY + 34);

  for (let i = 0; i < 3; i++) {
    drawHeartUI(hudX + 82 + i * 10, hudY + 4, i < player.hp);
  }

  for (let i = 0; i < player.maxMana; i++) {
    drawManaPipUI(hudX + 82 + i * 8, hudY + 18, i < player.mana);
  }
}

function drawWorld() {
  drawGround();

  drawPond();

  for (const reed of reeds) drawReed(reed);
  for (const fence of fences) drawFence(fence);
  for (const b of bushes) drawBush(b);
  for (const rock of rocks) drawRock(rock);
  for (const stump of stumps) drawStump(stump);
  for (const flower of flowers) drawFlower(flower);

  for (const t of trees) drawTreeBase(t);
  drawCabinBase();

  for (const a of acorns) {
    if (!a.collected) drawAcorn(a);
  }

  for (const b of manaBottles) {
    if (!b.collected) drawManaBottle(b);
  }

  drawChest();

  for (const d of diamonds) {
    if (!d.collected) drawDiamond(d);
  }

  for (const e of hitEffects) drawHitEffect(e);
  for (const p of projectiles) drawProjectile(p);
  for (const s of slimes) drawSlime(s);

  drawPlayer();
  drawWorldHint();

  for (const t of trees) {
    const fade = (Math.abs(player.x - t.x) < 20 && Math.abs(player.y - (t.y + 4)) < 20) ? 0.45 : 1;
    drawTreeTop(t, fade);
  }

  const nearCabin = (
    player.x > cabin.x &&
    player.x < cabin.x + cabin.w &&
    player.y > cabin.y + 8 &&
    player.y < cabin.y + 42
  );
  drawCabinRoof(nearCabin ? 0.45 : 1);

  drawToast();

  if (gameOver) {
    r(52, 54, 152, 34, "rgba(0,0,0,0.7)");
    r(54, 56, 148, 30, "rgba(255,255,255,0.8)");
    ctx.fillStyle = "#111";
    ctx.font = "12px monospace";
    ctx.fillText("GAME OVER", 91, 68);
    ctx.font = "8px monospace";
    ctx.fillText("TAP TO RESTART", 88, 80);
  } else if (gameWon) {
    r(46, 50, 164, 40, "rgba(0,0,0,0.7)");
    r(48, 52, 160, 36, "rgba(255,255,255,0.82)");
    ctx.fillStyle = "#111";
    ctx.font = "12px monospace";
    ctx.fillText("YOU MADE IT", 88, 66);
    ctx.font = "8px monospace";
    ctx.fillText("FOREST CLEARED", 84, 78);
  }
}

function render() {
  update();

  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.fillStyle = "#68b852";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const scale = Math.min(canvas.width / GAME_W, canvas.height / GAME_H);
  const drawW = GAME_W * scale;
  const drawH = GAME_H * scale;
  const offsetX = (canvas.width - drawW) / 2;
  const offsetY = (canvas.height - drawH) / 2;

  ctx.save();
  ctx.translate(offsetX, offsetY);
  ctx.scale(scale, scale);
  drawWorld();
  ctx.restore();

  drawHUDScreen();
  drawJoystick();
  drawUseButton();
  drawAttackButton();

  requestAnimationFrame(render);
}

render();
</script>
</body>
</html>
