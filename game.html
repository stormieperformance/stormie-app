<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Forest Gathering</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #111;
    touch-action: none;
  }

  canvas {
    display: block;
  }
</style>
</head>
<body>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// FULLSCREEN CANVAS
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

// PLAYER
const player = {
  x: 200,
  y: 200,
  size: 20,
  speed: 4
};

// TOUCH INPUT
let touch = null;

canvas.addEventListener("touchstart", e => {
  touch = e.touches[0];
});

canvas.addEventListener("touchmove", e => {
  touch = e.touches[0];
});

canvas.addEventListener("touchend", () => {
  touch = null;
});

// ACORNS
const acorns = [];
for (let i = 0; i < 12; i++) {
  acorns.push({
    x: Math.random() * 800,
    y: Math.random() * 1200,
    collected: false
  });
}

// CAMERA
let camera = { x: 0, y: 0 };

function update() {
  if (touch) {
    let dx = touch.clientX - canvas.width / 2;
    let dy = touch.clientY - canvas.height / 2;

    let len = Math.hypot(dx, dy);
    if (len > 5) {
      dx /= len;
      dy /= len;

      player.x += dx * player.speed;
      player.y += dy * player.speed;
    }
  }

  // collect
  acorns.forEach(a => {
    if (!a.collected) {
      const dist = Math.hypot(player.x - a.x, player.y - a.y);
      if (dist < 20) {
        a.collected = true;
      }
    }
  });

  // camera follows player
  camera.x = player.x - canvas.width / 2;
  camera.y = player.y - canvas.height / 2;
}

function draw() {
  // clear
  ctx.fillStyle = "#6bbf59";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.save();
  ctx.translate(-camera.x, -camera.y);

  // trees
  ctx.fillStyle = "#2e7d32";
  for (let i = 0; i < 25; i++) {
    ctx.beginPath();
    ctx.arc((i*120)%1000, Math.floor(i/5)*200, 40, 0, Math.PI*2);
    ctx.fill();

    ctx.fillStyle = "#5d4037";
    ctx.fillRect((i*120)%1000 - 10, Math.floor(i/5)*200, 20, 40);
    ctx.fillStyle = "#2e7d32";
  }

  // acorns
  acorns.forEach(a => {
    if (!a.collected) {
      ctx.fillStyle = "#c49a2c";
      ctx.beginPath();
      ctx.arc(a.x, a.y, 10, 0, Math.PI * 2);
      ctx.fill();
    }
  });

  // player
  ctx.fillStyle = "#4fc3f7";
  ctx.fillRect(player.x - 10, player.y - 10, 20, 20);

  ctx.restore();

  // UI
  const collected = acorns.filter(a => a.collected).length;
  ctx.fillStyle = "#000";
  ctx.font = "18px monospace";
  ctx.fillText("Acorns: " + collected + "/12", 20, 30);

  if (collected === 12) {
    ctx.fillText("All collected!", canvas.width/2 - 60, canvas.height/2);
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
