<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>Forest Gathering</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #000;
    touch-action: none;
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
</style>
</head>
<body>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d", { alpha: false });

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

// Internal low-res game surface for SNES look
const GAME_W = 256;
const GAME_H = 144;

// World
const WORLD_W = 768;
const WORLD_H = 768;
const TILE = 16;

// Camera
const camera = { x: 0, y: 0 };

// Touch input
let touch = null;
canvas.addEventListener("touchstart", e => {
  touch = e.touches[0];
}, { passive: false });
canvas.addEventListener("touchmove", e => {
  touch = e.touches[0];
  e.preventDefault();
}, { passive: false });
canvas.addEventListener("touchend", () => {
  touch = null;
});

// Player
const player = {
  x: 120,
  y: 120,
  w: 12,
  h: 14,
  speed: 1.8,
  dir: "down",
  step: 0
};

// Simple map data
const blocked = [];

// Add some trees and bushes in fixed positions
const trees = [
  {x: 96, y: 96}, {x: 176, y: 80}, {x: 320, y: 112}, {x: 448, y: 96},
  {x: 560, y: 128}, {x: 656, y: 96}, {x: 112, y: 256}, {x: 208, y: 304},
  {x: 336, y: 272}, {x: 496, y: 288}, {x: 624, y: 256}, {x: 144, y: 448},
  {x: 288, y: 496}, {x: 448, y: 464}, {x: 592, y: 496}, {x: 688, y: 560}
];

const bushes = [
  {x: 240, y: 160}, {x: 256, y: 160}, {x: 272, y: 160},
  {x: 400, y: 400}, {x: 416, y: 400}, {x: 432, y: 400},
  {x: 160, y: 608}, {x: 176, y: 608}, {x: 192, y: 608}
];

// Cabin
const cabin = { x: 520, y: 560, w: 96, h: 80 };

// Acorns
const acorns = [
  {x: 136, y: 168, collected: false},
  {x: 216, y: 120, collected: false},
  {x: 360, y: 168, collected: false},
  {x: 520, y: 184, collected: false},
  {x: 632, y: 168, collected: false},
  {x: 248, y: 344, collected: false},
  {x: 520, y: 344, collected: false},
  {x: 168, y: 536, collected: false},
  {x: 344, y: 552, collected: false},
  {x: 472, y: 648, collected: false}
];

function rectsOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
  return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
}

function addBlockedRect(x, y, w, h) {
  blocked.push({x, y, w, h});
}

// Tree trunks block movement
for (const t of trees) addBlockedRect(t.x - 6, t.y + 10, 12, 10);
// Bushes block movement
for (const b of bushes) addBlockedRect(b.x - 8, b.y - 4, 16, 10);
// Cabin walls block movement
addBlockedRect(cabin.x + 8, cabin.y + 36, cabin.w - 16, cabin.h - 36);

function canMoveTo(nx, ny) {
  const px = nx - player.w / 2;
  const py = ny - player.h / 2;
  for (const r of blocked) {
    if (rectsOverlap(px, py, player.w, player.h, r.x, r.y, r.w, r.h)) return false;
  }
  if (px < 0 || py < 0 || px + player.w > WORLD_W || py + player.h > WORLD_H) return false;
  return true;
}

function update() {
  let dx = 0;
  let dy = 0;

  if (touch) {
    const tx = touch.clientX / canvas.width * GAME_W;
    const ty = touch.clientY / canvas.height * GAME_H;
    dx = tx - GAME_W / 2;
    dy = ty - GAME_H / 2;

    const len = Math.hypot(dx, dy);
    if (len > 10) {
      dx /= len;
      dy /= len;
    } else {
      dx = 0;
      dy = 0;
    }
  }

  if (Math.abs(dx) > Math.abs(dy)) {
    player.dir = dx > 0 ? "right" : dx < 0 ? "left" : player.dir;
  } else if (Math.abs(dy) > 0) {
    player.dir = dy > 0 ? "down" : "up";
  }

  const mx = dx * player.speed;
  const my = dy * player.speed;

  if (canMoveTo(player.x + mx, player.y)) player.x += mx;
  if (canMoveTo(player.x, player.y + my)) player.y += my;

  if (mx !== 0 || my !== 0) player.step += 0.18;

  for (const a of acorns) {
    if (!a.collected) {
      const d = Math.hypot(player.x - a.x, player.y - a.y);
      if (d < 12) a.collected = true;
    }
  }

  camera.x = Math.max(0, Math.min(WORLD_W - GAME_W, player.x - GAME_W / 2));
  camera.y = Math.max(0, Math.min(WORLD_H - GAME_H, player.y - GAME_H / 2));
}

// Drawing helpers
function r(x, y, w, h, c) {
  ctx.fillStyle = c;
  ctx.fillRect(Math.floor(x), Math.floor(y), Math.floor(w), Math.floor(h));
}

function drawGround() {
  r(0, 0, GAME_W, GAME_H, "#6dbf57");

  for (let y = 0; y < GAME_H; y += TILE) {
    for (let x = 0; x < GAME_W; x += TILE) {
      r(x, y, TILE, TILE, ((x + y) / TILE) % 2 === 0 ? "#71c95b" : "#68b852");

      r(x + 3, y + 5, 1, 1, "#97d77b");
      r(x + 11, y + 9, 1, 1, "#97d77b");
      r(x + 7, y + 13, 1, 1, "#5aa848");
    }
  }

  // Dirt paths
  const paths = [
    {x: 90, y: 110, w: 110, h: 14},
    {x: 180, y: 110, w: 14, h: 110},
    {x: 180, y: 206, w: 180, h: 14},
    {x: 350, y: 206, w: 14, h: 180},
    {x: 350, y: 372, w: 190, h: 14}
  ];

  for (const p of paths) {
    r(p.x - camera.x, p.y - camera.y, p.w, p.h, "#c9ad67");
    for (let i = 0; i < p.w; i += 8) {
      for (let j = 0; j < p.h; j += 8) {
        r(p.x - camera.x + i + 2, p.y - camera.y + j + 2, 2, 2, "#b79656");
      }
    }
  }
}

function drawTreeBase(t) {
  const sx = t.x - camera.x;
  const sy = t.y - camera.y;
  r(sx - 4, sy + 8, 8, 10, "#7a4a21");
  r(sx - 2, sy + 10, 4, 8, "#915726");
}

function drawTreeTop(t, alpha = 1) {
  const sx = t.x - camera.x;
  const sy = t.y - camera.y;
  ctx.save();
  ctx.globalAlpha = alpha;
  r(sx - 18, sy - 18, 36, 36, "#1f6c2c");
  r(sx - 14, sy - 22, 28, 8, "#2f8534");
  r(sx - 22, sy - 6, 10, 14, "#2f8534");
  r(sx + 12, sy - 6, 10, 14, "#2f8534");
  r(sx - 8, sy + 10, 16, 8, "#2f8534");
  r(sx - 10, sy - 10, 4, 4, "#5fb95b");
  r(sx + 6, sy - 4, 4, 4, "#5fb95b");
  ctx.restore();
}

function drawBush(b) {
  const sx = b.x - camera.x;
  const sy = b.y - camera.y;
  r(sx - 8, sy - 6, 16, 10, "#2b7a34");
  r(sx - 6, sy - 8, 12, 4, "#419744");
}

function drawCabinBase() {
  const sx = cabin.x - camera.x;
  const sy = cabin.y - camera.y;
  r(sx + 8, sy + 34, cabin.w - 16, cabin.h - 34, "#8d5b2c");
  r(sx + 8, sy + 40, cabin.w - 16, 4, "#6f451f");
  r(sx + 8, sy + 52, cabin.w - 16, 4, "#6f451f");
  r(sx + 36, sy + 48, 20, 32, "#5a3518");
  r(sx + 40, sy + 52, 12, 28, "#74451f");
  r(sx + 44, sy + 64, 4, 4, "#c4a46a");
  r(sx + 14, sy + 70, cabin.w - 28, 6, "#4b2f18");
}

function drawCabinRoof(alpha = 1) {
  const sx = cabin.x - camera.x;
  const sy = cabin.y - camera.y;
  ctx.save();
  ctx.globalAlpha = alpha;
  r(sx, sy + 20, cabin.w, 18, "#7f2d2f");
  r(sx + 8, sy + 10, cabin.w - 16, 12, "#923636");
  r(sx + 16, sy, cabin.w - 32, 12, "#a64646");
  r(sx + 58, sy - 8, 10, 22, "#8c8c8c");
  r(sx + 60, sy - 10, 6, 4, "#b6b6b6");
  ctx.restore();
}

function drawAcorn(a) {
  const sx = a.x - camera.x;
  const sy = a.y - camera.y;
  r(sx - 4, sy - 1, 8, 7, "#c78f2f");
  r(sx - 3, sy - 4, 6, 4, "#9b6a20");
  r(sx + 1, sy - 6, 1, 2, "#6e4214");
}

function drawPlayer() {
  const sx = Math.floor(player.x - camera.x);
  const sy = Math.floor(player.y - camera.y);
  const bob = Math.sin(player.step * 2) > 0 ? 1 : 0;

  // shadow
  r(sx - 4, sy + 6, 8, 2, "rgba(0,0,0,0.25)");

  // hat / hair
  r(sx - 4, sy - 7 + bob, 8, 3, "#c58b39");
  // face
  r(sx - 3, sy - 4 + bob, 6, 4, "#f2c48d");
  // tunic
  r(sx - 5, sy + bob, 10, 7, "#45b84f");
  r(sx - 2, sy + 2 + bob, 4, 2, "#d1e87f");
  // belt
  r(sx - 5, sy + 4 + bob, 10, 1, "#6e4214");
  // legs
  r(sx - 3, sy + 7 + bob, 2, 4, "#8b5a2b");
  r(sx + 1, sy + 7 + bob, 2, 4, "#8b5a2b");

  if (player.dir === "left") r(sx - 7, sy + 1 + bob, 2, 5, "#45b84f");
  if (player.dir === "right") r(sx + 5, sy + 1 + bob, 2, 5, "#45b84f");
  if (player.dir === "up") r(sx - 4, sy - 7 + bob, 8, 8, "#45b84f");
}

function drawWorld() {
  drawGround();

  for (const b of bushes) drawBush(b);

  // bases first
  for (const t of trees) drawTreeBase(t);
  drawCabinBase();

  for (const a of acorns) {
    if (!a.collected) drawAcorn(a);
  }

  drawPlayer();

  // tops after player for depth
  for (const t of trees) {
    const fade = (Math.abs(player.x - t.x) < 20 && Math.abs(player.y - (t.y + 4)) < 20) ? 0.45 : 1;
    drawTreeTop(t, fade);
  }

  const nearCabin = (
    player.x > cabin.x &&
    player.x < cabin.x + cabin.w &&
    player.y > cabin.y + 8 &&
    player.y < cabin.y + 42
  );
  drawCabinRoof(nearCabin ? 0.45 : 1);

  // ui
  const collected = acorns.filter(a => a.collected).length;
  r(4, 4, 78, 14, "rgba(255,255,255,0.55)");
  ctx.fillStyle = "#111";
  ctx.font = "8px monospace";
  ctx.fillText(`ACORNS ${collected}/10`, 8, 14);

  if (collected === 10) {
    r(72, 62, 112, 18, "rgba(255,255,255,0.75)");
    ctx.fillStyle = "#111";
    ctx.font = "10px monospace";
    ctx.fillText("ALL ACORNS FOUND", 82, 74);
  }
}

function render() {
  update();

  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // scale game surface to full screen
  const scale = Math.max(canvas.width / GAME_W, canvas.height / GAME_H);
  const drawW = GAME_W * scale;
  const drawH = GAME_H * scale;
  const offsetX = (canvas.width - drawW) / 2;
  const offsetY = (canvas.height - drawH) / 2;

  ctx.save();
  ctx.translate(offsetX, offsetY);
  ctx.scale(scale, scale);
  drawWorld();
  ctx.restore();

  requestAnimationFrame(render);
}

render();
</script>
</body>
</html>
